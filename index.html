<!DOCTYPE html>
<html lang="af">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LekkeLeer – Lees Saam!</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header>
    <div class="logo">Lekke<span>Leer</span></div>
    <div class="header-badge">📖 Lees Saam</div>
  </header>

  <div class="stars-bar" id="starsBar" aria-label="Vorderingsterre"></div>

  <div class="mode-bar">
    <button class="mode-btn" id="modeListenBtn" data-mode="listen" type="button">🎤 Lees Hardop</button>
    <button class="mode-btn" id="modeTapBtn" data-mode="tap" type="button">👆 Tik Modus</button>
    <button class="mode-btn" id="modePlayBtn" data-mode="play" type="button">🔊 Luister</button>
  </div>

  <div class="voice-bar">
    <button class="voice-btn" id="voiceAdriBtn" data-voice="Adri" type="button">🎀 Adri (vrou)</button>
    <button class="voice-btn" id="voiceWillemBtn" data-voice="Willem" type="button">🧔 Willem (man)</button>
    <div class="tts-status ok" id="ttsStatus">✅ Azure TTS</div>
  </div>

  <div class="tip-bar" id="tipBar">🎤 Tik <strong>Begin Lees</strong> en lees die sin hardop!</div>

  <div class="card-wrap">
    <div class="sentence-card" id="mainCard">
      <div class="sentence-num" id="sentenceNum">1 / 7</div>
      <div class="sentence-emoji" id="sentenceEmoji">🐱</div>
      <div class="sentence-text" id="sentenceText"></div>
      <div class="translation" id="translation"></div>
    </div>

    <div class="celebration" id="celebration">
      <div class="celeb-emoji">🏆</div>
      <div class="celeb-title">Fantasties gedoen! 🌟</div>
      <div class="celeb-sub">Jy het al 7 sinne gelees!<br><em>You read all 7 sentences!</em></div>
      <div class="final-score">
        <div><div class="fs-val green" id="finalCorrect">0</div><div class="fs-lbl">Korrek</div></div>
        <div><div class="fs-val red" id="finalMissed">0</div><div class="fs-lbl">Gemis</div></div>
        <div><div class="fs-val blue" id="finalPct">0%</div><div class="fs-lbl">Telling</div></div>
      </div>
      <button class="restart-btn" id="restartBtn" type="button">🔄 Weer probeer!</button>
    </div>

    <div class="mic-status idle" id="micStatus">
      <div class="mic-dot"></div>
      <span>Kies modus...</span>
    </div>

    <div class="score-chip hidden" id="scoreChip">
      <span class="score-correct">✓ <span id="scoreCorrect">0</span></span>
      <span class="score-missed">✗ <span id="scoreMissed">0</span></span>
    </div>

    <div class="controls" id="controls">
      <button class="ctrl-btn btn-prev" id="prevBtn" type="button"><span class="icon">◀</span>Terug</button>
      <button class="ctrl-btn btn-listen" id="listenBtn" type="button"><span class="icon" id="listenIcon">🎤</span><span id="listenLabel">Begin Lees</span></button>
      <button class="ctrl-btn btn-play hidden" id="playBtn" type="button"><span class="icon">🔊</span>Speel</button>
      <button class="ctrl-btn btn-word hidden" id="wordBtn" type="button"><span class="icon">👆</span>Woord</button>
      <button class="ctrl-btn btn-next" id="nextBtn" type="button">Volgende<span class="icon">▶</span></button>
    </div>

    <div class="progress-dots" id="progressDots"></div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
